<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FraudShield — Login</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">FraudShield</div>
    <div class="login-tagline">FINANCIAL FRAUD DETECTION SYSTEM</div>

    <div class="form-group mb-16">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="username" placeholder="admin" autocomplete="username">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="login-error" id="login-error">Invalid credentials. Try admin / fraud2024</div>

    <button class="btn btn-primary" style="width:100%;margin-top:20px;justify-content:center" onclick="doLogin()">
      Sign In
    </button>

    <div class="login-hint">
      Demo → admin / fraud2024 &nbsp;|&nbsp; analyst / analyze123
    </div>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script>
  // Redirect if already logged in
  if (sessionStorage.getItem("fd_user")) {
    window.location.href = "pages/dashboard.html";
  }

  function doLogin() {
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value;
    const err = document.getElementById("login-error");

    if (AUTH.login(u, p)) {
      window.location.href = "pages/dashboard.html";
    } else {
      err.classList.add("show");
      setTimeout(() => err.classList.remove("show"), 3000);
    }
  }

  // Enter key support
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });
</script>
</body>
</html>
