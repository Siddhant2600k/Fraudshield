<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History — FraudShield</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="app">

  <aside class="sidebar" id="sidebar"></aside>

  <div class="main">
    <div class="page-header">
      <div class="page-title">Transaction <span>History</span></div>
      <div class="page-actions">
        <button class="btn btn-ghost" onclick="loadHistory()">↺ Refresh</button>
        <button class="btn btn-ghost" onclick="downloadCSV()">⬇ Export CSV</button>
        <button class="btn btn-danger" onclick="clearHistory()">✕ Clear All</button>
      </div>
    </div>

    <div class="page-body">

      <!-- Filters -->
      <div class="card" style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div class="form-group" style="flex:1;min-width:140px">
            <label class="form-label">Filter by Risk</label>
            <select class="form-select" id="filter-risk" onchange="applyFilter()">
              <option value="">All Levels</option>
              <option value="LOW">LOW</option>
              <option value="MEDIUM">MEDIUM</option>
              <option value="HIGH">HIGH</option>
              <option value="CRITICAL">CRITICAL</option>
            </select>
          </div>
          <div class="form-group" style="flex:1;min-width:140px">
            <label class="form-label">Min Amount (₹)</label>
            <input class="form-input" type="number" id="filter-min" placeholder="0" oninput="applyFilter()">
          </div>
          <div class="form-group" style="flex:1;min-width:140px">
            <label class="form-label">Max Prob (%)</label>
            <input class="form-input" type="number" id="filter-maxprob" placeholder="100" min="0" max="100" oninput="applyFilter()">
          </div>
          <div style="display:flex;align-items:flex-end">
            <button class="btn btn-ghost" onclick="resetFilter()">Reset</button>
          </div>
        </div>
      </div>

      <!-- Summary -->
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">
        Showing <span id="showing-count">0</span> of <span id="total-count">0</span> transactions
      </div>

      <!-- Table -->
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Transaction ID</th>
                <th>Timestamp</th>
                <th>Amount</th>
                <th>Type</th>
                <th>Channel</th>
                <th>Device</th>
                <th>Fraud Prob</th>
                <th>Anomaly</th>
                <th>Flags</th>
                <th>Risk</th>
              </tr>
            </thead>
            <tbody id="history-tbody">
              <tr><td colspan="10" style="text-align:center;padding:32px;color:var(--text-dim)">
                Loading...
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../assets/js/utils.js"></script>
<script>
AUTH.check();
renderSidebar("history.html");

let allRecords = [];

async function loadHistory() {
  try {
    const data = await apiFetch("/history?limit=500");
    allRecords = data.records || [];
    document.getElementById("total-count").textContent = allRecords.length;
    applyFilter();
  } catch(e) {
    toast("Failed to load history: " + e.message, "error");
  }
}

function applyFilter() {
  const riskF   = document.getElementById("filter-risk").value;
  const minAmt  = parseFloat(document.getElementById("filter-min").value) || 0;
  const maxProb = parseFloat(document.getElementById("filter-maxprob").value);

  let filtered = allRecords.filter(r => {
    if (riskF && r.risk_level !== riskF) return false;
    if (r.input.amount < minAmt) return false;
    if (!isNaN(maxProb) && (r.fraud_probability * 100) > maxProb) return false;
    return true;
  });

  document.getElementById("showing-count").textContent = filtered.length;
  renderTable(filtered);
}

function resetFilter() {
  document.getElementById("filter-risk").value = "";
  document.getElementById("filter-min").value = "";
  document.getElementById("filter-maxprob").value = "";
  applyFilter();
}

function renderTable(records) {
  const tbody = document.getElementById("history-tbody");
  if (!records.length) {
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:32px;color:var(--text-dim)">No records found</td></tr>`;
    return;
  }
  tbody.innerHTML = records.map(r => `
    <tr>
      <td class="mono" style="color:var(--accent);font-size:11px">${r.transaction_id}</td>
      <td>${fmtDate(r.timestamp)}</td>
      <td class="mono">${fmt$(r.input.amount)}</td>
      <td>${r.input.transaction_type || "—"}</td>
      <td>${r.input.payment_channel || "—"}</td>
      <td>${r.input.device_used || "—"}</td>
      <td style="color:${probColor(r.fraud_probability)}">${fmtPct(r.fraud_probability)}</td>
      <td style="color:${r.anomaly_score < 0 ? 'var(--orange)' : 'var(--green)'}">${r.anomaly_score.toFixed(4)}</td>
      <td style="font-size:11px;color:var(--text-muted)">${(r.flags||[]).length} flag${(r.flags||[]).length !== 1 ? 's':''}</td>
      <td>${riskBadge(r.risk_level)}</td>
    </tr>`).join("");
}

async function clearHistory() {
  if (!confirm("Clear all transaction history?")) return;
  try {
    await apiFetch("/history", { method: "DELETE" });
    allRecords = [];
    renderTable([]);
    document.getElementById("total-count").textContent = 0;
    document.getElementById("showing-count").textContent = 0;
    toast("History cleared", "info");
  } catch(e) {
    toast("Error: " + e.message, "error");
  }
}

function downloadCSV() {
  if (!allRecords.length) { toast("No records to export", "warn"); return; }
  const headers = ["transaction_id","timestamp","amount","transaction_type","payment_channel",
                   "device_used","fraud_probability","anomaly_score","composite_score","risk_level","flags"];
  const rows = allRecords.map(r => [
    r.transaction_id, r.timestamp,
    r.input.amount, r.input.transaction_type, r.input.payment_channel, r.input.device_used,
    r.fraud_probability, r.anomaly_score, r.composite_score, r.risk_level,
    (r.flags||[]).join(" | ")
  ]);
  const csv = [headers, ...rows].map(r => r.join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `fraud_history_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast("Exported " + allRecords.length + " records", "info");
}

loadHistory();
</script>
</body>
</html>
