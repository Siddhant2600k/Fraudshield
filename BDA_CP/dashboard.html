<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="sidebar">
    <h2>💳 FinTech AI</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="analytics.html">Analytics</a>
    <a href="history.html">History</a>
</div>

<div class="main">

<div class="header">
    Dashboard Overview
    <button onclick="toggleTheme()">🌗</button>
</div>

<div class="cards">
    <div class="card">Total Tx<br><h2 id="totalTx">0</h2></div>
    <div class="card">Frauds<br><h2 id="fraudCount">0</h2></div>
    <div class="card">Risk<br><h2 id="riskStatus">-</h2></div>
</div>

<div class="card">
    <h3>Fraud Checker</h3>

    <input id="amount" type="number" placeholder="Amount">
    <input id="deviation" type="number" step="0.01" placeholder="Deviation">
    <input id="velocity" type="number" step="0.01" placeholder="Velocity">
    <input id="geo" type="number" step="0.01" placeholder="Geo Score">

    <button onclick="checkFraud()">Analyze</button>

    <div id="result"></div>
</div>

<div class="card">
    <h3>Live Activity</h3>
    <div id="liveFeed"></div>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
